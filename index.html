<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOS CheatSheet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <h1 class="app-title">TOS CheatSheet</h1>
            <button class="btn btn-reset" id="btnReset" aria-label="Réinitialiser le timer">RESET</button>
        </div>
        <div class="header-center">
            <div class="timer-display" id="globalTimer">00:00</div>
        </div>
        <div class="header-right">
            <button class="btn btn-start-stop" id="btnStartStop" aria-label="Démarrer l'investigation">START</button>
        </div>
    </header>
    <main class="app-main">
        <!-- Section Preuves -->
        <div class="proofs-container">
            <section class="tile thermal-tile" id="thermalTile">
                <h2 class="tile-title">Thermal</h2>
                <div class="button-group">
                    <button class="btn-thermal btn-level" data-level="1" aria-label="Level 1" data-tooltip="Level 1 - Mild (0.5°C to 4.5°C | 33.0°F to 40.0°F)">Level 1</button>
                    <button class="btn-thermal btn-level" data-level="2" aria-label="Level 2" data-tooltip="Level 2 - Moderate (0.0°C to 9.5°C | 32.0°F to 15.0°F)">Level 2</button>
                    <button class="btn-thermal btn-level" data-level="3" aria-label="Level 3" data-tooltip="Level 3 - Significant (-13.3°C to -10.0°C | 8.0°F to 14°F)">Level 3</button>
                    <button class="btn-thermal btn-level" data-level="4" aria-label="Level 4" data-tooltip="Level 4 - Frigid (-20.5°C to -13.9°C | -0.5°F to 7.0°F)">Level 4</button>
                </div>
                <div class="graph-container">
                    <canvas id="thermalCanvas" class="graph-canvas" width="800" height="180"></canvas>
                </div>
                <div class="control-buttons">
                    <button class="btn-control" id="thermalUndo" aria-label="Remove last point">&#8617; Undo</button>
                    <button class="btn-control" id="thermalReset" aria-label="Reset tile">&#128465; Reset</button>
                </div>
            </section>
            <section class="tile audio-tile" id="audioTile">
                <h2 class="tile-title">Audio</h2>
                <div class="button-group">
                    <button class="btn-audio btn-level" data-level="1" aria-label="Level 1" data-tooltip="Level 1 - Unintelligible Sounds: Nonsensical sounds, incoherent speech and garbled noises with no discernible words or phrases.">Level 1</button>
                    <button class="btn-audio btn-level" data-level="2" aria-label="Level 2" data-tooltip="Level 2 - Single Word Responses: Short, distinct words that, although minimal, are clear and direct.">Level 2</button>
                    <button class="btn-audio btn-level" data-level="3" aria-label="Level 3" data-tooltip="Level 3 - Intelligible Phrases: Complete, understandable phrases and coherent speech.">Level 3</button>
                </div>
                <div class="graph-container">
                    <canvas id="audioCanvas" class="graph-canvas" width="800" height="180"></canvas>
                </div>
                <div class="control-buttons">
                    <button class="btn-control" id="audioUndo" aria-label="Remove last point">&#8617; Undo</button>
                    <button class="btn-control" id="audioReset" aria-label="Reset tile">&#128465; Reset</button>
                </div>
            </section>
            <section class="tile emf-tile" id="emfTile">
                <h2 class="tile-title">EMF</h2>
                <div class="button-group">
                    <button class="btn-emf btn-level" data-level="1" aria-label="Level 1" data-tooltip="Level 1 - Weak Anomalies (1.5 to 2.49 mG)">Level 1</button>
                    <button class="btn-emf btn-level" data-level="2" aria-label="Level 2" data-tooltip="Level 2 - Moderate Disturbances (2.55 to 9.99 mG)">Level 2</button>
                    <button class="btn-emf btn-level" data-level="3" aria-label="Level 3" data-tooltip="Level 3 - Strong Emissions (10 to 19.99 mG)">Level 3</button>
                    <button class="btn-emf btn-level" data-level="4" aria-label="Level 4" data-tooltip="Level 4 - Overwhelming Fields (20+ mG)">Level 4</button>
                </div>
                <div class="graph-container">
                    <canvas id="emfCanvas" class="graph-canvas" width="800" height="180"></canvas>
                </div>
                <div class="control-buttons">
                    <button class="btn-control" id="emfUndo" aria-label="Remove last point">&#8617; Undo</button>
                    <button class="btn-control" id="emfReset" aria-label="Reset tile">&#128465; Reset</button>
                </div>
            </section>
            <section class="tile radiation-tile" id="radiationTile">
                <h2 class="tile-title">Radiation</h2>
                <div class="button-group">
                    <button class="btn-radiation btn-level" data-level="1" aria-label="Level 1" data-tooltip="Level 1 - Minimal (CPM Range: 100 to 500)">Level 1</button>
                    <button class="btn-radiation btn-level" data-level="2" aria-label="Level 2" data-tooltip="Level 2 - Moderate (CPM Range: 501 to 1000)">Level 2</button>
                    <button class="btn-radiation btn-level" data-level="3" aria-label="Level 3" data-tooltip="Level 3 - Intense (CPM Range: 1001 to 2000)">Level 3</button>
                </div>
                <div class="graph-container">
                    <canvas id="radiationCanvas" class="graph-canvas" width="800" height="180"></canvas>
                </div>
                <div class="control-buttons">
                    <button class="btn-control" id="radiationUndo" aria-label="Remove last point">&#8617; Undo</button>
                    <button class="btn-control" id="radiationReset" aria-label="Reset tile">&#128465; Reset</button>
                </div>
            </section>
            <section class="tile uv-tile" id="uvTile">
                <h2 class="tile-title">UV</h2>
                <div class="button-group">
                    <button class="btn-uv btn-level" data-level="1" aria-label="Level 1" data-tooltip="Level 1 - Faint traces (Subtle, barely visible markings or slight discoloration)">Level 1</button>
                    <button class="btn-uv btn-level" data-level="2" aria-label="Level 2" data-tooltip="Level 2 - Moderate Residues (Glowing objects or surfaces, or intense patterns)">Level 2</button>
                    <button class="btn-uv btn-level" data-level="3" aria-label="Level 3" data-tooltip="Level 3 - Easily Identifiable Patterns (Clear and distinct patterns or markings)">Level 3</button>
                </div>
                <div class="graph-container">
                    <canvas id="uvCanvas" class="graph-canvas" width="800" height="180"></canvas>
                </div>
                <div class="control-buttons">
                    <button class="btn-control" id="uvUndo" aria-label="Remove last point">&#8617; Undo</button>
                    <button class="btn-control" id="uvReset" aria-label="Reset tile">&#128465; Reset</button>
                </div>
            </section>
            <section class="tile writing-tile" id="writingTile">
                <h2 class="tile-title">Writing</h2>
                <div class="button-group">
                    <button class="btn-writing btn-level" data-level="1" aria-label="Level 1" data-tooltip="Level 1 - Incomprehensible Scribling (Writing would appear as chaotic scribbles)">Level 1</button>
                    <button class="btn-writing btn-level" data-level="2" aria-label="Level 2" data-tooltip="Level 2 - Symbolic Enigmas (The messages might be in the form of intricate symbols)">Level 2</button>
                    <button class="btn-writing btn-level" data-level="3" aria-label="Level 3" data-tooltip="Level 3 - Hostile Manifestifications (Exceptionally aggressive and malevolent messages)">Level 3</button>
                </div>
                <div class="graph-container">
                    <canvas id="writingCanvas" class="graph-canvas" width="800" height="180"></canvas>
                </div>
                <div class="control-buttons">
                    <button class="btn-control" id="writingUndo" aria-label="Remove last point">&#8617; Undo</button>
                    <button class="btn-control" id="writingReset" aria-label="Reset tile">&#128465; Reset</button>
                </div>
            </section>
        </div>
        <!-- Section Comportements -->
        <div class="behaviors-container">
            <section class="tile behavior-tile" id="lightOnTile">
                <h2 class="tile-title">Light On</h2>
                <div class="counter-display" id="lightOnCount">0</div>
                <div class="counter-buttons">
                    <button class="btn-counter btn-increment" id="lightOnIncrement" aria-label="Increment Light On count">+1</button>
                    <button class="btn-counter btn-decrement" id="lightOnDecrement" aria-label="Decrement Light On count">-1</button>
                </div>
            </section>
            <section class="tile behavior-tile" id="lightOffTile">
                <h2 class="tile-title">Light Off</h2>
                <div class="counter-display" id="lightOffCount">0</div>
                <div class="counter-buttons">
                    <button class="btn-counter btn-increment" id="lightOffIncrement" aria-label="Increment Light Off count">+1</button>
                    <button class="btn-counter btn-decrement" id="lightOffDecrement" aria-label="Decrement Light Off count">-1</button>
                </div>
            </section>
        </div>
        <!-- Section Fantômes -->
        <div class="ghosts-container">
            <div class="ghosts-placeholder">Top 3 Ghosts — Coming Soon</div>
        </div>
    </main>
    <footer class="ghost-bar">
        <div class="ghost-bar-content" id="ghostBar">
            <span class="ghost-placeholder">Top 3 Ghosts — Coming Soon</span>
        </div>
    </footer>
    <div class="confirmation-overlay" id="confirmationOverlay">
        <div class="confirmation-modal">
            <h3 id="confirmationTitle">Confirmation</h3>
            <p id="confirmationMessage">Are you sure?</p>
            <div class="confirmation-actions">
                <button class="btn-confirm-cancel" id="confirmationCancel">Cancel</button>
                <button class="btn-confirm-action" id="confirmationConfirm">Confirm</button>
            </div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/graph-renderer.js"></script>
    <script src="js/tiles/thermal-tile.js"></script>
    <script src="js/tiles/audio-tile.js"></script>
    <script src="js/tiles/emf-tile.js"></script>
    <script src="js/tiles/radiation-tile.js"></script>
    <script src="js/tiles/uv-tile.js"></script>
    <script src="js/tiles/writing-tile.js"></script>
    <script src="js/tiles/behavior-tile.js"></script>
</body>
</html>
